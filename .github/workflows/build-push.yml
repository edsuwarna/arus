name: Build & Push to ghcr.io

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_API: ghcr.io/edsuwarna/arus/api
  IMAGE_NAME_CONSOLE: ghcr.io/edsuwarna/arus/console

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      console: ${{ steps.filter.outputs.console }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'arus/**'
              - 'Dockerfile'
              - 'requirements.txt'
              - 'alembic/**'
              - 'alembic.ini'
              - 'config/**'
              - 'scripts/**'
              - '.github/workflows/**'
            console:
              - 'console/**'
              - 'Dockerfile.console'
              - 'nginx/**'
              - '.github/workflows/**'

  api:
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push arus-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME_API }}:latest
            ${{ env.IMAGE_NAME_API }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

  console:
    needs: changes
    if: ${{ needs.changes.outputs.console == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push arus-console
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.console
          push: true
          tags: |
            ${{ env.IMAGE_NAME_CONSOLE }}:latest
            ${{ env.IMAGE_NAME_CONSOLE }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
