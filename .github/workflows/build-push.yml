name: Build & Push to Zot Registry

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Zot Registry
        uses: docker/login-action@v3
        with:
          registry: registry.edsuwarna.xyz
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & Push arus-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            registry.edsuwarna.xyz/arus-api:main-latest
            registry.edsuwarna.xyz/arus-api:${{ github.sha }}

      - name: Build & Push arus-console
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.console
          push: true
          tags: |
            registry.edsuwarna.xyz/arus-console:main-latest
            registry.edsuwarna.xyz/arus-console:${{ github.sha }}
