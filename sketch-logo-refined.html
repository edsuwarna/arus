<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Logo Refined</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0b0d11; font-family: 'Inter', sans-serif;
    display: flex; flex-direction: column; align-items: center; padding: 60px 40px;
  }
  .section { margin-bottom: 60px; text-align: center; }
  .label {
    font-size: 14px; font-weight: 600; letter-spacing: 2px;

  .variants { display: flex; gap: 60px; flex-wrap: wrap; justify-content: center; }
  .card { text-align: center; }
  .card .preview {
    width: 160px; height: 160px; margin: 0 auto 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .card .label-sm { font-size: 13px; color: #9aa0a8; margin-top: 4px; }
  .card .fav {
    display: flex; gap: 8px; justify-content: center; margin-top: 12px;
    align-items: center;
  }
  .card .fav svg { border-radius: 4px; }
</style>
